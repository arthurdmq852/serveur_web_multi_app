<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nous contacter</title>
    <link rel="stylesheet" href="templates/static/styles.css">
    <link rel="icon" type="image/x-icon" href="templates/images/internet.ico">
</head>

<body>
    <header class="top-nav">
        <a href="index.html" class="nav-button">Accueil</a>
        <a href="about.html" class="nav-button">À propos</a>
        <a href="contact.html" class="nav-button">Contacter</a>
    </header>

    <div class="main-container">
        <h1 class="main-title">Serveur - Multi App</h1> 

        <section class="contact-form-section">
            <h2>Envoyez-nous un message</h2>
            
            <form action="#" method="post" class="contact-form">
                <div class="form-group">
                    <label for="recipient">Choisir un service :</label>
                    <select id="recipient" name="recipient">
                        <option value="zyad.laouani@ynov.com">Zyad LAOUANI (zyad.laouani@ynov.com)</option>
                        <option value="arthur.demarcq@ynov.com">Arthur DEMARCQ (arthur.demarcq@ynov.com)</option>
                        <option value="louis.godard@ynov.com">Louis GODARD (louis.godard@ynov.com)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="name">Nom :</label>
                    <input type="text" id="name" name="name" placeholder="Votre nom" required>
                </div>

                <div class="form-group">
                    <label for="email">Votre Email :</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Message :</label>
                    <textarea id="message" name="message" rows="5" placeholder="Comment pouvons-nous vous aider ?" required></textarea>
                </div>

                <button type="submit" class="submit-button">Envoyer</button>
            </form>
        </section>
    </div>
</body>
</html>
